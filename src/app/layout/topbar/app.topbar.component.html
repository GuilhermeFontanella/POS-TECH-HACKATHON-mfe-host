<div class="layout-topbar">
    <a class="layout-topbar-logo" routerLink="">
        <img src="assets/layout/images/logo.png" alt="logo">
        <span>NEUROFLOW</span>
    </a>

    <button #menubutton class="p-link layout-menu-button layout-topbar-button" (click)="layoutService.onMenuToggle()">
        <i class="pi pi-bars"></i>
    </button>

    <button #topbarmenubutton class="p-link layout-topbar-menu-button layout-topbar-button" (click)="layoutService.showProfileSidebar()">
        <i class="pi pi-ellipsis-v"></i>
    </button>

    <div #topbarmenu class="layout-topbar-menu" [ngClass]="{'layout-topbar-menu-mobile-active': layoutService.state.profileSidebarVisible}">
        <p-overlayPanel #op>
            <div class="flex flex-row justify-content-between align-items-center w-15rem gap-3 mb-3">
                <h4 class="mb-0">Pomodoro</h4>
                <button pTooltip="Configurar Pomodoro" tooltipPosition="bottom" [showDelay]="500" pButton class="p-button-text mr-2" icon="pi pi-cog" [routerLink]="'/pages/pomodoro'"></button>
            </div>
            <app-pomodoro-display></app-pomodoro-display>
        </p-overlayPanel>
        <button *ngIf="settingsService.focusMode$ | async" (click)="op.toggle($event)" class="p-link layout-topbar-button">
            <i class="pi pi-clock"></i>
            <span>Pomodoro</span>
        </button>
        <p-overlayPanel #user>
            <div class="flex flex-column gap-3">
                <button pButton class="p-button-text" label="Ir para preferências" icon="pi pi-check" (click)="goTo('/pages/settings')"></button>
                <button pButton class="p-button-danger" label="Sair" icon="pi pi-sign-out"></button>
            </div>
        </p-overlayPanel>
        <button (click)="user.toggle($event)" class="p-link layout-topbar-button">
            <i class="pi pi-user"></i>
            <span>Profile</span>
        </button>
        <button class="p-link layout-topbar-button" (click)="goTo('/pages/settings')">
            <i class="pi pi-cog"></i>
            <span>Settings</span>
        </button>
    </div>
</div>
